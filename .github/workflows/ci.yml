name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy agents/ core/ api/

      - name: Unit tests
        run: pytest --cov=. --cov-report=term-missing

  infra:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_e2b_api_key: ${{ secrets.E2B_API_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: [test, infra]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/multi-agent-analyst:$IMAGE_TAG .
          docker push $ECR_REGISTRY/multi-agent-analyst:$IMAGE_TAG
          docker tag $ECR_REGISTRY/multi-agent-analyst:$IMAGE_TAG \
                     $ECR_REGISTRY/multi-agent-analyst:latest
          docker push $ECR_REGISTRY/multi-agent-analyst:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster multi-agent-analyst \
            --service multi-agent-analyst \
            --force-new-deployment
