name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy agents/ core/ api/

      - name: Unit tests
        run: pytest --cov=. --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/multi-agent-analyst:$IMAGE_TAG .
          docker push $ECR_REGISTRY/multi-agent-analyst:$IMAGE_TAG
          docker tag $ECR_REGISTRY/multi-agent-analyst:$IMAGE_TAG \
                     $ECR_REGISTRY/multi-agent-analyst:latest
          docker push $ECR_REGISTRY/multi-agent-analyst:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster multi-agent-analyst \
            --service multi-agent-analyst \
            --force-new-deployment
